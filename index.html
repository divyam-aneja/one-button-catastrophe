<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina - Series B Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(23, 23, 23, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .progress-glow { box-shadow: 0 0 15px rgba(234, 179, 8, 0.4); }
    </style>
</head>
<body class="bg-[#0a0a0a] text-zinc-200 min-h-screen flex items-center justify-center p-4">

    <div id="game-container" class="w-full max-w-xl glass p-10 rounded-3xl shadow-2xl transition-all duration-500">
        <div id="content">
            <div class="text-center">
                <div class="mb-6 inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-yellow-400 to-orange-600 shadow-lg">
                    <span class="text-3xl">💡</span>
                </div>
                <h1 class="text-4xl font-semibold tracking-tight text-white mb-4">Lumina OS</h1>
                <p class="text-zinc-400 mb-10 text-lg">The world's first AI-driven, hyper-scalable, decentralized illumination ecosystem.</p>
                
                <button onclick="nextStep('startup')" class="group relative w-full py-4 bg-white text-black font-bold rounded-xl transition-all hover:bg-zinc-200 overflow-hidden">
                    <span class="relative z-10">INITIALIZE LIGHT REQUEST</span>
                    <div class="absolute inset-0 w-0 bg-zinc-300 transition-all group-hover:w-full"></div>
                </button>
            </div>
        </div>

        <div id="meta-ui" class="hidden mt-10 pt-6 border-t border-zinc-800 text-[10px] uppercase tracking-[0.2em] text-zinc-500 flex justify-between">
            <span>Status: <span id="status-tag" class="text-yellow-500">Idle</span></span>
            <span>VC Funding: <span id="funding-tag" class="text-green-500">$2.4M</span></span>
        </div>
    </div>

    <script>
        const content = document.getElementById('content');
        const statusTag = document.getElementById('status-tag');
        const fundingTag = document.getElementById('funding-tag');
        const metaUI = document.getElementById('meta-ui');

        const scenarios = {
            startup: {
                title: "Provisioning Resources",
                desc: "Our serverless architecture is spinning up. However, we've detected you're on a 'Basic' plan.",
                status: "Monetizing...",
                options: [
                    { text: "Watch 30s Ad for Light", link: 'ad' },
                    { text: "Upgrade to Enterprise ($499/mo)", link: 'enterprise' }
                ]
            },
            ad: {
                title: "Strategic Partnership",
                desc: "The ad is loading... It's an ad for a different lightbulb startup. They claim to be 10x faster.",
                status: "Retention Risk",
                options: [
                    { text: "Ignore & Wait", link: 'bureaucracy' },
                    { text: "Click Ad (Abandon Lumina)", link: 'traitor' }
                ]
            },
            enterprise: {
                title: "Welcome, Visionary",
                desc: "Enterprise tier unlocked. We've assigned a dedicated 'Success Manager' to your light switch. He needs to hop on a 15-minute sync.",
                status: "Syncing...",
                options: [
                    { text: "Schedule Zoom Call", link: 'bureaucracy' },
                    { text: "Ask for 'Async' Approval", link: 'denied' }
                ]
            },
            bureaucracy: {
                title: "The Alignment Phase",
                desc: "The Success Manager loves the 'Light' idea but needs a Carbon Impact Study. The polar bears are watching.",
                status: "Analyzing...",
                options: [
                    { text: "Generate ESG Report", link: 'pivot' },
                    { text: "Bribe with Carbon Credits", link: 'pivot' }
                ]
            },
            pivot: {
                title: "URGENT PIVOT",
                desc: "Market conditions have changed. Investors no longer believe in 'Light'. We are now a Crypto-Darkness company.",
                status: "Pivoting...",
                options: [
                    { text: "Accept the Void", link: 'void' },
                    { text: "Insist on Light (End of Runway)", link: 'denied' }
                ]
            },
            denied: {
                title: "Mission Aborted",
                desc: "The Board of Directors has determined that turning on the light is 'non-core' to our 2026 roadmap.",
                status: "Bankrupt",
                options: [{ text: "Restart Disrupting", link: 'restart' }]
            },
            void: {
                title: "The Darkness is Live",
                desc: "Congratulations. By doing nothing, you have saved $0.0004 in energy costs. Investors are thrilled. You are now the CEO.",
                status: "Exit Achieved",
                options: [{ text: "IPO (Restart)", link: 'restart' }]
            },
            traitor: {
                title: "Churn Detected",
                desc: "You clicked the competitor's ad. They also have a 12-step verification process. There is no escape.",
                status: "Churned",
                options: [{ text: "Return to Lumina", link: 'restart' }]
            }
        };

        function nextStep(id) {
            if (id === 'restart') return location.reload();
            
            const step = scenarios[id];
            metaUI.classList.remove('hidden');
            statusTag.innerText = step.status;
            
            // Randomly decrease funding to add stress
            const currentFunding = parseInt(fundingTag.innerText.replace(/[^0-9]/g, ''));
            fundingTag.innerText = `$${(currentFunding * 0.8).toFixed(1)}M`;

            content.innerHTML = `
                <div class="animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <h2 class="text-2xl font-bold text-white mb-2">${step.title}</h2>
                    <p class="text-zinc-400 mb-8">${step.desc}</p>
                    <div class="space-y-3">
                        ${step.options.map(opt => `
                            <button onclick="nextStep('${opt.link}')" class="w-full py-3 px-6 border border-zinc-700 rounded-xl hover:bg-zinc-800 transition-all text-sm font-medium">
                                ${opt.text}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
