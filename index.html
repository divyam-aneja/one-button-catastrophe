<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina - The Future of Light</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-gold {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .loading-bar { transition: width 0.5s ease-in-out; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex items-center justify-center font-sans overflow-hidden">

    <div id="app" class="w-full max-w-md p-8 border border-zinc-800 rounded-3xl bg-zinc-900 shadow-2xl text-center">
        
        <div id="hero-section">
            <div class="mb-6 inline-block p-4 rounded-full bg-yellow-500/10 text-yellow-500">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
            </div>
            <h1 class="text-3xl font-bold tracking-tight mb-2">Lumina OS</h1>
            <p class="text-zinc-400 mb-8">Revolutionizing the Photon-as-a-Service Paradigm.</p>
            
            <button id="mainButton" onclick="startCatastrophe()" class="w-full py-4 bg-zinc-100 text-zinc-950 font-bold rounded-xl hover:bg-white transition-all transform hover:scale-105 active:scale-95 shadow-lg shadow-white/5">
                ACTIVATE LIGHT
            </button>
        </div>

        <div id="process-section" class="hidden space-y-6">
            <h2 id="status-text" class="text-sm font-mono uppercase tracking-widest text-yellow-500">Initializing Ecosystem...</h2>
            
            <div class="w-full bg-zinc-800 h-2 rounded-full overflow-hidden">
                <div id="progress-bar" class="loading-bar bg-yellow-500 h-full w-0"></div>
            </div>

            <div id="log-container" class="text-left bg-black p-4 rounded-lg h-32 overflow-y-auto text-xs font-mono text-zinc-500 space-y-1 border border-zinc-800">
                </div>

            <div id="decision-node" class="hidden p-4 border border-blue-500/30 bg-blue-500/5 rounded-lg">
                <p class="text-xs text-blue-400 mb-3">AI PREDICTION ENGINE: You appear to be in a dark room. Is this a strategic choice?</p>
                <div class="flex gap-2">
                    <button class="flex-1 text-[10px] bg-blue-500 py-2 rounded uppercase font-bold" onclick="log('User confirmed darkness preference. Pivoting to "Night Vision" mode.')">Yes (Strategic)</button>
                    <button class="flex-1 text-[10px] border border-blue-500 py-2 rounded uppercase font-bold" onclick="log('User rejects AI advice. Flagging for review.')">No (Force On)</button>
                </div>
            </div>
        </div>

        <div id="failure-section" class="hidden text-center animate-in fade-in zoom-in duration-500">
            <div class="text-red-500 mb-4">
                <svg class="mx-auto" xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            </div>
            <h3 class="text-xl font-bold text-white mb-2">Request Deprecated</h3>
            <p id="fail-reason" class="text-zinc-400 text-sm italic mb-6"></p>
            <button onclick="location.reload()" class="text-xs text-zinc-500 underline hover:text-white">Back to Seed Round</button>
        </div>
    </div>

    <script>
        const logs = [
            "Booting Synergy-Core v4.2.0...",
            "Contacting AWS (Amazon Web Sunlight)...",
            "Establishing consensus via Proof-of-Brightness...",
            "Forming Lumina-Squad steering committee...",
            "Generating 400-page ESG Carbon Neutrality Report...",
            "AI predicting user intent (Deep Learning)...",
            "Consulting with Venture Capitalists...",
            "Legal team reviewing photon distribution license...",
            "Finalizing Stakeholder Alignment...",
            "Budget constraints detected in Q3 projection..."
        ];

        function log(msg) {
            const container = document.getElementById('log-container');
            const entry = document.createElement('div');
            entry.innerText = `> ${msg}`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        async function startCatastrophe() {
            document.getElementById('hero-section').classList.add('hidden');
            document.getElementById('process-section').classList.remove('hidden');
            
            const progressBar = document.getElementById('progress-bar');
            const statusText = document.getElementById('status-text');

            for (let i = 0; i < logs.length; i++) {
                statusText.innerText = logs[i];
                progressBar.style.width = `${(i + 1) * 10}%`;
                log(logs[i]);

                if (i === 5) {
                    document.getElementById('decision-node').classList.remove('hidden');
                    await new Promise(r => setTimeout(r, 2500));
                    document.getElementById('decision-node').classList.add('hidden');
                }

                await new Promise(r => setTimeout(r, 1200));
            }

            endInFailure();
        }

        function endInFailure() {
            const failures = [
                "Light request forwarded to the Review Committee.",
                "Photon emission canceled due to excessive simplicity.",
                "Action denied: Current budget only supports 'Thought-Leadership' about light.",
                "Error: No Investor-Market-Fit found for this specific lamp."
            ];
            
            document.getElementById('process-section').classList.add('hidden');
            document.getElementById('failure-section').classList.remove('hidden');
            document.getElementById('fail-reason').innerText = failures[Math.floor(Math.random() * failures.length)];
        }
    </script>
</body>
</html>
